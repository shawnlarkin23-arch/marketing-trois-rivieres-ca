<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
body{font-family:'Inter',system-ui,sans-serif;}

.input{width:100%;background:#fff;border:2px solid #e2e8f0;border-radius:9999px;padding:24px 32px;font-size:1.125rem;}

.btn-pro{background:linear-gradient(90deg,#1e40af,#3b82f6);color:#fff;font-weight:700;font-size:1.25rem;padding:28px 72px;border-radius:9999px;box-shadow:0 15px 35px -10px rgb(30 64 175);transition:.3s;}
.btn-pro:hover{transform:translateY(-3px) scale(1.03);}
.result-card{background:#fff;border-radius:24px;padding:32px;box-shadow:0 10px 40px -15px rgb(0 0 0 /.12);}
.benefit-box{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border:2px solid #bae6fd;}
</style>
</head>

<body class="bg-slate-50 text-slate-800">

<!-- NAV -->
<nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
<div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-11 h-11 bg-gradient-to-br from-blue-700 to-indigo-700 rounded-3xl flex items-center justify-center text-white font-bold text-3xl">S</div>
<div>

</div>
<a href="index.html#contact" class="bg-blue-700 hover:bg-blue-800 text-white px-8 py-4 rounded-3xl font-semibold flex items-center gap-3 transition">
<i class="fas fa-phone"></i> 819-555-0123
</a>
</div>
</nav>

<div class="max-w-5xl mx-auto px-6 py-16">
<div class="text-center mb-16">
<h1 class="heading-font text-6xl font-bold mb-6">
Découvrez le vrai potentiel de votre projet
</h1>
</div>

<div class="grid md:grid-cols-12 gap-12">

<!-- FORM -->
<div class="md:col-span-5 bg-white rounded-3xl shadow-xl p-10">
<div class="space-y-7">

<input type="text" id="businessName" class="input" placeholder="Nom entreprise">

<select id="sector" class="input">
<option value="">Votre secteur</option>
<option value="Construction">Construction</option>
<option value="Lavage auto">Lavage auto</option>
<option value="Santé">Santé</option>
<option value="E-commerce">E-commerce</option>
<option value="Services">Services</option>
</select>

<input type="number" id="budget" class="input" placeholder="Budget pub quotidien ($)">
<input type="number" id="cost" class="input" placeholder="Coût par unité ($)">
<input type="number" id="sellingPrice" class="input" placeholder="Prix de vente ($)">

</div>

<button onclick="calculate()" class="btn-pro w-full mt-10">
CALCULER MON POTENTIEL
</button>
</div>

<!-- RESULTS -->
<div id="results" class="md:col-span-7"></div>

</div>
</div>

<footer class="bg-slate-950 text-slate-400 py-16 text-center">
<p>Fait avec passion pour les entrepreneurs locaux qui veulent créer un patrimoine profitable et améliorer la qualité de vie de leurs clients.</p>
</footer>

<script>
function calculate(){

const businessName=document.getElementById('businessName').value.trim()||"Votre entreprise";
const sector=document.getElementById('sector').value||"Secteur non spécifié";
const budget=parseFloat(document.getElementById('budget').value);
const cost=parseFloat(document.getElementById('cost').value);
const sellingPrice=parseFloat(document.getElementById('sellingPrice').value);

if(!budget||!cost||!sellingPrice||sellingPrice<=cost){
alert("Veuillez entrer des valeurs valides.");
return;
}

const without={cpm:18,ctr:0.018,conv:0.015};
const withS={cpm:9,ctr:0.028,conv:0.032};

function calc(bench){
const adSpend=budget*30;
const impressions=(budget*1000)/bench.cpm;
const clicks=impressions*bench.ctr;
const sales=Math.round(clicks*bench.conv);
const revenue=sales*sellingPrice;
const cogs=sales*cost;
const profit=revenue-cogs-adSpend;
return{sales,revenue,profit,adSpend};
}

const mWithout=calc(without);
const mWith=calc(withS);
const diff=mWith.profit-mWithout.profit;

const resultsDiv=document.getElementById("results");

resultsDiv.innerHTML=`
<div class="result-card">
<h2 class="heading-font text-3xl font-bold mb-6">${businessName}</h2>

<div class="mb-6 text-xl">
Profit supplémentaire estimé :
<span class="font-bold text-emerald-600">
$${diff.toFixed(0)}
</span>
</div>

<div class="grid md:grid-cols-2 gap-6 mb-10">

<div class="border rounded-3xl p-6">
<h3 class="font-semibold mb-4">Sans optimisation</h3>
<p>Ventes: ${mWithout.sales}</p>
<p>Profit: $${mWithout.profit.toFixed(0)}</p>
</div>

<div class="border-2 border-blue-600 rounded-3xl p-6">
<h3 class="font-semibold mb-4 text-blue-700">Avec Shawn Marketing</h3>
<p>Ventes: ${mWith.sales}</p>
<p class="text-emerald-600 font-bold">
Profit: $${mWith.profit.toFixed(0)}
</p>
</div>

</div>

<div class="benefit-box p-8 rounded-3xl text-center">
<p class="text-2xl font-semibold text-blue-700 mb-6">
Réservez votre consultation stratégique gratuite (30 min)
</p>

<form action="https://formspree.io/f/xjgeavga" method="POST" class="space-y-4 max-w-md mx-auto">
<input type="text" name="name" required placeholder="Votre nom" class="input">
<input type="email" name="email" required placeholder="Votre email" class="input">
<input type="tel" name="phone" required placeholder="Téléphone" class="input">
<button type="submit" class="btn-pro w-full">
Réserver ma consultation
</button>
</form>

</div>
</div>
`;

resultsDiv.scrollIntoView({behavior:"smooth"});
}
</script>

</body>
