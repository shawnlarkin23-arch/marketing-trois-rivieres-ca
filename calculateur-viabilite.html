<div class="max-w-4xl mx-auto px-6 py-20 text-center">
<h1 class="heading-font text-5xl mb-6">
Calculateur de potentiel de profit
</h1>
<p class="text-xl mb-12">
Estimez ce que votre entreprise peut générer avec une stratégie optimisée.
</p>

<div class="bg-white p-10 rounded-3xl shadow-lg space-y-6">

<input type="number" id="budget" class="input" placeholder="Budget publicitaire mensuel ($)">
<input type="number" id="cost" class="input" placeholder="Coût par produit ($)">
<input type="number" id="price" class="input" placeholder="Prix de vente ($)">

<button onclick="calculate()" class="btn-pro w-full">
Calculer mon potentiel
</button>

<div id="result" class="mt-8 text-2xl font-semibold"></div>

</div>
</div>

<footer class="bg-slate-950 text-slate-400 py-10 text-center">
<p>© 2026 Shawn Marketing – Trois-Rivières</p>
</footer>

<script>
function calculate(){
let budget = parseFloat(document.getElementById('budget').value);
let cost = parseFloat(document.getElementById('cost').value);
let price = parseFloat(document.getElementById('price').value);

if(!budget || !cost || !price || price<=cost){
alert("Valeurs invalides.");
return;
}

let sales = Math.round((budget/2)/cost);
let revenue = sales*price;
let profit = revenue - (sales*cost) - budget;

document.getElementById('result').innerHTML =
"Profit estimé : <span class='text-emerald-600'>+" + profit.toFixed(0) + "$</span>";
}
</script>
